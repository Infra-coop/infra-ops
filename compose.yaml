name: co-infra

# Shared services host. Traefik terminates TLS and routes by Host header to
# backend containers. Add a service = add a container + the four traefik labels.
# Backends are never published directly — only Traefik binds 80/443.

networks:
  edge:
    driver: bridge

volumes:
  jetstream-data:

services:
  traefik:
    # Must be a build whose Docker client speaks API >= 1.40 — this droplet's
    # daemon (Engine 29, API 1.55) rejects the older 1.24 that Traefik v3.3 sent,
    # which left the Docker provider dead and no routers loading. Rolling v3 tag
    # to pick up the fix; pin to an exact version once confirmed working.
    image: traefik:v3
    restart: unless-stopped
    command:
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      # File provider supplies the Cloudflare Origin Certificate (see dynamic/).
      - --providers.file.directory=/etc/traefik/dynamic
      - --providers.file.watch=true
      - --entrypoints.web.address=:80
      - --entrypoints.web.http.redirections.entrypoint.to=websecure
      - --entrypoints.web.http.redirections.entrypoint.scheme=https
      - --entrypoints.websecure.address=:443
    ports:
      - "80:80"
      - "443:443"
    volumes:
      # Cloudflare Origin Cert (not in git) + the dynamic TLS config that loads it.
      - ./certs:/certs:ro
      - ./dynamic:/etc/traefik/dynamic:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks: [edge]

  imgproxy:
    image: darthsim/imgproxy:v3
    restart: unless-stopped
    environment:
      IMGPROXY_BIND: ":8080"
      # Signed-URL keys — MUST match the co-infra-img Worker's secrets.
      IMGPROXY_KEY: ${IMGPROXY_KEY}
      IMGPROXY_SALT: ${IMGPROXY_SALT}
      # SSRF defense-in-depth: only ever fetch https origins (PDSes).
      IMGPROXY_ALLOWED_SOURCES: "https://"
      # Abuse limits.
      IMGPROXY_MAX_SRC_RESOLUTION: "70"          # megapixels
      IMGPROXY_MAX_SRC_FILE_SIZE: "20971520"     # 20 MB
      IMGPROXY_MAX_ANIMATION_FRAMES: "60"
      IMGPROXY_DOWNLOAD_TIMEOUT: "10"
      IMGPROXY_READ_TIMEOUT: "10"
      IMGPROXY_WRITE_TIMEOUT: "10"
      # Format is chosen by the Worker and baked into the signed URL, so let
      # imgproxy honor it rather than re-negotiating from Accept.
      IMGPROXY_ENFORCE_AVIF: "false"
      IMGPROXY_ENFORCE_WEBP: "false"
      IMGPROXY_CONCURRENCY: "8"
      IMGPROXY_TTL: "31536000"
      IMGPROXY_USE_ETAG: "true"
    networks: [edge]
    labels:
      - traefik.enable=true
      - traefik.http.routers.imgproxy.rule=Host(`${IMGPROXY_DOMAIN}`)
      - traefik.http.routers.imgproxy.entrypoints=websecure
      - traefik.http.routers.imgproxy.tls=true
      - traefik.http.services.imgproxy.loadbalancer.server.port=8080
    # CPU-heavy, bursty tenant — capped so it can't starve neighbors.
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 3g
    healthcheck:
      test: ["CMD", "imgproxy", "health"]
      interval: 30s
      timeout: 5s
      retries: 3

  jetstream:
    # Watches the firehose for account deletions and purges the CDN cache.
    # See docs/services/jetstream.md. No inbound, so no Traefik labels.
    build: ./services/jetstream
    restart: unless-stopped
    environment:
      PURGE_URL: ${PURGE_URL}
      PURGE_TOKEN: ${PURGE_TOKEN}
      JETSTREAM_URL: ${JETSTREAM_URL:-wss://jetstream1.us-east.bsky.network/subscribe}
      CURSOR_FILE: /data/cursor
    volumes:
      - jetstream-data:/data
    networks: [edge]
