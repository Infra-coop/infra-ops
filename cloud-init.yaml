#cloud-config
# Provisions a bare Hetzner (or any cloud) VPS into an infra.coop services host:
# Docker + a locked-down firewall + a `deploy` user that CI SSHes in as to run
# `git pull && docker compose up -d` on merges to main.
#
# Pass this as the server's user-data at create time. It gets the box to the
# point where the one-time first-run in the README (clone repo, fill .env,
# first `up`) can happen; everything after that is GitOps.

package_update: true
package_upgrade: true

packages:
  - ufw
  - ca-certificates
  - curl
  - git

users:
  - default
  - name: deploy
    groups: [sudo]
    shell: /bin/bash
    sudo: ["ALL=(ALL) NOPASSWD:ALL"]
    ssh_authorized_keys:
      # KEYPAIR A (CI -> box). This is the PUBLIC half; it is safe to commit.
      # The matching PRIVATE half goes in the repo's Actions secret DEPLOY_SSH_KEY.
      # Lets the deploy workflow SSH in as `deploy`. Replace before boot.
      - REPLACE_WITH_CI_DEPLOY_PUBLIC_KEY

runcmd:
  # Docker Engine + Compose plugin.
  - curl -fsSL https://get.docker.com | sh
  - usermod -aG docker deploy
  - systemctl enable --now docker

  # Firewall: SSH + HTTP(S) only. Backends are never published directly.
  - ufw default deny incoming
  - ufw default allow outgoing
  - ufw allow OpenSSH
  - ufw allow 80/tcp
  - ufw allow 443/tcp
  - ufw --force enable

  # Trust github.com so the first `git clone` doesn't prompt on host verification.
  - install -d -m 700 -o deploy -g deploy /home/deploy/.ssh
  - sh -c 'ssh-keyscan github.com > /home/deploy/.ssh/known_hosts'
  - chown deploy:deploy /home/deploy/.ssh/known_hosts

  # Stack lives here, owned by the deploy user.
  - mkdir -p /opt/infra-coop
  - chown -R deploy:deploy /opt/infra-coop

# KEYPAIR B (box -> GitHub, read-only) can't live here — its PRIVATE half must
# never be committed. It's generated ON the box during first-run and its PUBLIC
# half is added as a read-only Deploy Key on the repo, so the box can clone/pull
# the private repo. See the ops README first-run runbook.

final_message: "infra.coop services host provisioned. Do the one-time first-run from the ops README, then GitOps takes over."
